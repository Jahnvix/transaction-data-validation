services:
  - type: web
    name: transaction-validator-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: STORAGE_DIR
        value: storage/jobs
